# DecapBridge PKCE auth — replaces deprecated Netlify Git Gateway
backend:
  name: git-gateway
  repo: HaveyDylan/usedextraction
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/67ee2ce7-cf25-401b-af12-12eb342b21c0/pkce
  auth_token_endpoint: /sites/67ee2ce7-cf25-401b-af12-12eb342b21c0/token
  gateway_url: https://gateway.decapbridge.com

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

site_url: https://usedextraction1.netlify.app

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "inventory"
    label: "Equipment Inventory"
    delete: false
    files:
      - name: "listings"
        label: "Equipment Listings"
        file: "listings.json"
        description: "Add, edit, or remove equipment. Each item appears in the Inventory section of the website."
        fields:
          - label: "Listings"
            name: "items"
            label_singular: "Listing"
            widget: "list"
            summary: "{{fields.name}} — {{fields.status}}"
            fields:
              - { label: "Equipment name", name: "name", widget: "string", hint: "e.g. Wiped Film Evaporator — 6 inch" }
              - { label: "Category", name: "category", widget: "select", options: ["Wiped Film", "Ethanol", "Hydrocarbon", "Post-Processing"], required: false }
              - { label: "Specs", name: "specs", widget: "string", required: false, hint: "e.g. Stainless 316L · 2024 · ~1.5 L/hr" }
              - { label: "Price", name: "price", widget: "string", required: false, hint: "e.g. $48,500 OBO. Leave blank to show 'Inquire for price'." }
              - { label: "Status", name: "status", widget: "select", options: ["Available", "Pending", "Sold", "Hidden"], default: "Available", hint: "Choose 'Hidden' to take an item off the site without deleting it." }
              - { label: "Photo", name: "image", widget: "image", required: false, choose_url: false }
              - { label: "Feature on homepage", name: "featured", widget: "boolean", default: false, required: false, hint: "Show this machine as the big hero image at the top of the homepage. Needs a photo." }
