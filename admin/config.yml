# DecapBridge PKCE auth — replaces deprecated Netlify Git Gateway
backend:
  name: git-gateway
  repo: HaveyDylan/usedextraction
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/67ee2ce7-cf25-401b-af12-12eb342b21c0/pkce
  auth_token_endpoint: /sites/67ee2ce7-cf25-401b-af12-12eb342b21c0/token
  gateway_url: https://gateway.decapbridge.com

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

site_url: https://usedextraction1.netlify.app

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "inventory"
    label: "Equipment Inventory"
    delete: false
    files:
      - name: "listings"
        label: "Equipment Listings"
        file: "listings.json"
        description: "Add, edit, or remove equipment. Each item gets its own page on the website with a photo gallery, specs, and details."
        fields:
          - label: "Listings"
            name: "items"
            label_singular: "Listing"
            widget: "list"
            summary: "{{fields.title}} — {{fields.status}}"
            fields:
              - { label: "Equipment name", name: "title", widget: "string", hint: "e.g. Chemtech KD6 Wiped Film Evaporator" }
              - { label: "Category", name: "category", widget: "select", options: ["Extraction", "Distillation", "Solvent Recovery", "Post Processing"] }
              - { label: "Sub-category (Extraction only)", name: "subcategory", widget: "select", options: ["", "Ethanol", "Hydrocarbon"], required: false, default: "", hint: "Only used for Extraction. Leave blank otherwise." }
              - { label: "Type", name: "type", widget: "string", required: false, hint: "e.g. Wiped Film Evaporator" }
              - { label: "Status", name: "status", widget: "select", options: ["Available", "Pending", "Sold", "Hidden"], default: "Available", hint: "Choose 'Hidden' to take an item off the site without deleting it." }
              - { label: "Price", name: "price", widget: "string", required: false, hint: "e.g. $67,000. Leave blank to show 'Request Quote'." }
              - label: "Photos (gallery)"
                name: "images"
                widget: "list"
                required: false
                field: { label: "Photo", name: "image", widget: "image" }
                hint: "Click 'Add Photo' for each image. The first photo is the main image and the homepage hero. Add as many as you like."
              - { label: "Condition", name: "condition", widget: "string", required: false, hint: "e.g. Used — Tested & Running" }
              - { label: "Location", name: "location", widget: "string", required: false, default: "Anaheim, CA" }
              - { label: "Manufacturer", name: "manufacturer", widget: "string", required: false }
              - { label: "Model", name: "model", widget: "string", required: false }
              - { label: "Year", name: "year", widget: "string", required: false }
              - { label: "Feature on homepage", name: "featured", widget: "boolean", default: false, required: false, hint: "Show this machine as the big hero image at the top of the homepage." }
              - label: "Tags / badges"
                name: "tags"
                widget: "list"
                required: false
                field: { label: "Tag", name: "tag", widget: "string" }
                hint: "Short keywords, e.g. Turnkey, UL Listed, C1D1."
              - { label: "Short description", name: "short", widget: "string", required: false, hint: "One line shown in search results and previews." }
              - { label: "Overview", name: "overview", widget: "text", required: false, hint: "The main description paragraph on the listing page." }
              - label: "Throughput"
                name: "throughput"
                widget: "list"
                required: false
                field: { label: "Line", name: "line", widget: "string" }
                hint: "One bullet per line, e.g. 'Terpene strip: 1–2 L/hr'."
              - label: "What's included"
                name: "included"
                widget: "list"
                required: false
                field: { label: "Item", name: "item", widget: "string" }
                hint: "One item per line."
              - label: "Specifications"
                name: "specs"
                widget: "list"
                required: false
                summary: "{{fields.label}}: {{fields.value}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }
              - { label: "Inspection notes", name: "inspection", widget: "text", required: false }
              - { label: "Shipping & logistics", name: "logistics", widget: "text", required: false }
              - { label: "Custom URL (optional)", name: "slug", widget: "string", required: false, hint: "Leave blank — the link is created automatically from the equipment name. Only fill this in if you want a specific custom link." }
